apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-acm-sync-leader-election
  namespace: cert-manager-acm-sync
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-acm-sync-leader-election
  namespace: cert-manager-acm-sync
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-acm-sync-leader-election
subjects:
  - kind: ServiceAccount
    name: cert-manager-acm-sync
    namespace: cert-manager-acm-sync
