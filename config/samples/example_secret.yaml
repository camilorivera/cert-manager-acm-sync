# Example: cert-manager Certificate resource that produces a TLS Secret
# annotated for ACM sync.
#
# The controller will import this certificate into ACM and write the ARN
# back as acm.sync/arn. Subsequent renewals are re-imported to the same ARN.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: my-service-tls
  namespace: default
spec:
  secretName: my-service-tls
  secretTemplate:
    annotations:
      acm.sync/enabled: "true"
      # acm.sync/region: "us-east-1"  # Uncomment for CloudFront certificates
  dnsNames:
    - my-service.example.com
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
---
# Alternatively, annotate an existing TLS Secret directly:
apiVersion: v1
kind: Secret
type: kubernetes.io/tls
metadata:
  name: my-existing-tls
  namespace: default
  annotations:
    acm.sync/enabled: "true"
    # Optional: override the target AWS region (e.g. for CloudFront)
    # acm.sync/region: "us-east-1"
    #
    # The following annotations are written by the controller — do not set manually:
    # acm.sync/arn: "arn:aws:acm:..."
    # acm.sync/fingerprint: "..."
    # acm.sync/last-sync: "..."
data:
  tls.crt: <base64-encoded-certificate-chain>
  tls.key: <base64-encoded-private-key>
