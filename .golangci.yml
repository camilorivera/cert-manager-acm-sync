linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam

linters-settings:
  goimports:
    local-prefixes: github.com/camilorivera/cert-manager-acm-sync

issues:
  exclude-rules:
    # Allow dot imports in test files (common in controller tests)
    - path: _test\.go
      linters: [revive]
