services:
  dev:
    image: golang:1.25-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    environment:
      - GOFLAGS=-mod=mod
      - CGO_ENABLED=0

  lint:
    image: golangci/golangci-lint:v2.12.2
    working_dir: /workspace
    volumes:
      - .:/workspace
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    command: ["golangci-lint", "run", "--timeout=5m"]

volumes:
  go-build-cache:
  go-mod-cache:
