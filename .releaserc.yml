branches:
  - main
plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
      releaseRules:
        - type: feat
          release: minor
        - type: fix
          release: patch
        - type: perf
          release: patch
        - type: docs
          release: patch
        - breaking: true
          release: major
  - "@semantic-release/release-notes-generator"
  - - "@semantic-release/exec"
    - prepareCmd: >-
        sed -i 's/^version:.*/version: ${nextRelease.version}/' charts/cert-manager-acm-sync/Chart.yaml &&
        sed -i 's/^appVersion:.*/appVersion: "${nextRelease.version}"/' charts/cert-manager-acm-sync/Chart.yaml
  - - "@semantic-release/changelog"
    - changelogFile: CHANGELOG.md
  - - "@semantic-release/git"
    - assets:
        - CHANGELOG.md
        - charts/cert-manager-acm-sync/Chart.yaml
      message: "chore(release): ${nextRelease.version} [skip ci]"
  - "@semantic-release/github"
