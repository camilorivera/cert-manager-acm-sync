{{- if and .Values.rbac.create .Values.rbac.clusterScoped }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-acm-sync.fullname" . }}
  labels:
    {{- include "cert-manager-acm-sync.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-acm-sync.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cert-manager-acm-sync.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- else if and .Values.rbac.create (not .Values.rbac.clusterScoped) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cert-manager-acm-sync.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cert-manager-acm-sync.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cert-manager-acm-sync.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cert-manager-acm-sync.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
