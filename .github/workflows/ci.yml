name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Download modules
        run: go mod download
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Download envtest binaries
        run: |
          go run sigs.k8s.io/controller-runtime/tools/setup-envtest@latest \
            use --bin-dir .envtest/bin -p path
      - name: Run tests
        env:
          KUBEBUILDER_ASSETS: ${{ github.workspace }}/.envtest/bin
          CGO_ENABLED: "0"
        run: go test -v -count=1 ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Download modules
        run: go mod download
      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -o bin/manager ./cmd/manager
      - name: Build Docker image
        run: docker build -t cert-manager-acm-sync:ci .
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: cert-manager-acm-sync:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
